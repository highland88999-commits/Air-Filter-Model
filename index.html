<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OLYMPUS // AETHERIS-7 // DIAGNOSTIC_TERMINAL_01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { --neon: #00f3ff; --glass: rgba(5, 5, 10, 0.95); --pink: #ff0055; --bg: #000a12; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Courier New', monospace; color: var(--neon); touch-action: none; }
        canvas#mainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* DIAGNOSTIC UI (Top Left) */
        #ui {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            font-size: 11px; letter-spacing: 2px; pointer-events: none;
            text-shadow: 0 0 10px var(--neon);
            display: flex; flex-direction: column; gap: 4px;
        }
        
        .monitor-line { display: flex; gap: 8px; }
        .label { color: rgba(0, 243, 255, 0.6); }
        .glitch { color: var(--pink); animation: blink 1s step-end infinite; }
        
        /* STATUS HUD (Top Right) */
        #status-hud {
            position: absolute; top: 25px; right: 25px; z-index: 1000;
            background: var(--glass); padding: 15px; border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.3); backdrop-filter: blur(20px);
            width: 180px;
        }
        
        #filter-bar-container {
            width: 100%; height: 8px; background: rgba(255, 0, 85, 0.1);
            border-radius: 4px; overflow: hidden; margin-top: 8px;
        }
        #filter-bar {
            width: 100%; height: 100%; background: var(--pink);
            transition: width 0.3s linear;
        }

        /* MAINTENANCE CONTROLS (Bottom Center) */
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 300px; z-index: 1000;
            background: var(--glass); padding: 20px; border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.3); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; gap: 12px;
        }
        
        .btn {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 243, 255, 0.5);
            color: var(--neon); padding: 14px; border-radius: 6px;
            cursor: pointer; text-transform: uppercase; font-size: 12px; font-weight: 900;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s; touch-action: manipulation; font-family: inherit;
        }
        
        .btn:active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); transform: scale(0.98); }
        .btn[disabled] { border-color: rgba(255,0,85,0.4); color: var(--pink); cursor: not-allowed; opacity: 0.5; }

        @keyframes blink { 50% { opacity: 0.1; } }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>

    <div id="ui">
        // OLYMPUS_AETHERIS-7_ENGINE_001<br>
        // ARCH: 8D_SLING_SYNCHRONIZED<br>
        <div class="monitor-line">
            <span class="label">// STATUS:</span>
            <span id="sync-status">OFFLINE</span>
        </div>
        <div class="monitor-line">
            <span class="label">// Core Flow:</span>
            <span id="flow-status">VACUUMING</span>
        </div>
    </div>

    <div id="status-hud">
        // Filter_Life //
        <div id="filter-percent">100%</div>
        <div id="filter-bar-container">
            <div id="filter-bar"></div>
        </div>
    </div>

    <div id="controls">
        <button id="reset-filter-btn" class="btn" onclick="simFilterChange()">Filter Change</button>
    </div>

    <script>
        let scene, camera, renderer, clock, light;
        let unitGroup, globalHue = 190, time = 0;
        let particlesIn, particlesOut;
        let flowDirection = 'in'; // 'in' = vacuuming, 'out' = blowing
        let filterLife = 1; // 1 = 100%, 0 = 0%
        let systemOnline = true;

        // --- Error/Glitch Monitor ---
        const setStatus = (id, text, isError = false) => {
            const el = document.getElementById(id);
            el.textContent = text;
            if (isError) {
                el.classList.add('glitch');
            } else {
                el.classList.remove('glitch');
            }
        };

        const sceneSetup = () => {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 14);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('mainCanvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            clock = new THREE.Clock();

            // Lighting
            light = new THREE.PointLight(0x00d4ff, 2, 50);
            light.position.set(5, 5, 5);
            scene.add(light, new THREE.AmbientLight(0x404040));
        };

        // --- THE NEON GRID (Infinite Aesthetic) ---
        const createGrid = () => {
            const gridSize = 100;
            const gridDivs = 100;
            const gridColor = new THREE.Color(0x00d4ff);
            
            const gridHelper = new THREE.GridHelper(gridSize, gridDivs, gridColor, 0x011a2f);
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);
        };

        // --- CIRCULAR PARTICLE GENERATOR ---
        const createCircularTexture = (alpha = 1, fade = 0.3) => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
            grad.addColorStop(fade, `rgba(255,255,255,${alpha * 0.4})`);
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        };

        // --- AETHERIS-7 UNIT COMPONENT ---
        export function createAetherisUnit() {
            const group = new THREE.Group();

            // 1. EXTERNAL EXOSKELETON (7m Scale)
            const frameGeom = new THREE.BoxGeometry(2.5, 7, 2.5);
            const frameMat = new THREE.MeshPhongMaterial({
                color: 0x111111, shininess: 100,
                transparent: true, opacity: 0.9, side: THREE.DoubleSide
            });
            const frame = new THREE.Mesh(frameGeom, frameMat);
            frame.name = "Frame";

            // Wireframe overlay for "High-Tech" look
            const edges = new THREE.EdgesGeometry(frameGeom);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00d4ff }));
            group.add(frame, line);

            // 2. INTERNAL ELECTROSTATIC CORE (3M Tech)
            const coreGeom = new THREE.CylinderGeometry(0.8, 0.8, 6, 32);
            const coreMat = new THREE.MeshPhongMaterial({
                color: 0x00d4ff, emissive: 0x00d4ff,
                emissiveIntensity: 1.5, transparent: true, opacity: 0.4
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            group.add(core);

            // 3. INTERNAL FILTRATION PLATES
            for (let i = 0; i < 12; i++) {
                const plateGeom = new THREE.TorusGeometry(0.7, 0.02, 16, 100);
                const plateMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff });
                const plate = new THREE.Mesh(plateGeom, plateMat);
                plate.rotation.x = Math.PI / 2;
                plate.position.y = -3 + (i * 0.5);
                group.add(plate);
            }

            // 4. THE SIGNATURE NEON HALO (Apex Output)
            const haloGeom = new THREE.TorusGeometry(1.5, 0.05, 16, 100);
            const haloMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.8 });
            const halo = new THREE.Mesh(haloGeom, haloMat);
            halo.rotation.x = Math.PI / 2;
            halo.position.y = 3.8;
            halo.name = "HaloApex";
            group.add(halo);

            // 5. BASE INDUCTION UNIT (Vacuum Input)
            const baseGeom = new THREE.CylinderGeometry(1.5, 1.8, 1, 4);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const base = new THREE.Mesh(baseGeom, baseMat);
            base.position.y = -3.5;
            group.add(base);

            return group;
        }

        // --- SIMULATED FLOW (Vacuuming vs. Blowing) ---
        const createFlowParticles = () => {
            const pCount = 2000;
            const geom = new THREE.BufferGeometry();
            const pos = new Float32Array(pCount * 3);
            const col = new Float32Array(pCount * 3);

            for (let i = 0; i < pCount; i++) {
                // Initialize in a volume near the ground for vacuuming
                pos[i * 3] = (Math.random() - 0.5) * 10;
                pos[i * 3 + 1] = Math.random() * -5 - 3; // Start below the base
                pos[i * 3 + 2] = (Math.random() - 0.5) * 10;
                
                // Color: Start murky/blue-grey
                col[i * 3] = 0.1; col[i * 3 + 1] = 0.5; col[i * 3 + 2] = 1.0;
            }

            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geom.setAttribute('color', new THREE.BufferAttribute(col, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.1, map: createCircularTexture(1, 0.4),
                transparent: true, blending: THREE.AdditiveBlending,
                vertexColors: true, sizeAttenuation: true
            });

            return new THREE.Points(geom, mat);
        };

        const createCleanAirOutput = () => {
            const pCount = 1000;
            const geom = new THREE.BufferGeometry();
            const pos = new Float32Array(pCount * 3);

            for (let i = 0; i < pCount; i++) {
                // Initialize at the Halo/Apex
                pos[i * 3] = (Math.random() - 0.5) * 2;
                pos[i * 3 + 1] = 3.8; // Halo position
                pos[i * 3 + 2] = (Math.random() - 0.5) * 2;
            }

            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.4, map: createCircularTexture(0.7, 0.2), // Fuzzed out/misty look
                color: 0x00d4ff, transparent: true, opacity: 0.2,
                blending: THREE.AdditiveBlending, sizeAttenuation: true
            });

            const points = new THREE.Points(geom, mat);
            points.name = "CleanAirOutput";
            return points;
        };

        // --- Maintenance Functions ---
        const updateMaintenanceHud = () => {
            document.getElementById('filter-percent').textContent = Math.round(filterLife * 100) + '%';
            document.getElementById('filter-bar').style.width = (filterLife * 100) + '%';
        };

        const checkSystemHealth = () => {
            if (filterLife <= 0 && systemOnline) {
                // Trigger Failure State
                systemOnline = false;
                flowDirection = 'idle'; // Stop flow
                
                setStatus('sync-status', 'ERR_FAILURE', true);
                setStatus('flow-status', 'OFFLINE', true);
                document.getElementById('reset-filter-btn').disabled = false; // Enable change button
            }
        };

        // Sim Filter Change Function (Offer simulated maintenance)
        window.simFilterChange = function() {
            // Password simulation
            const pass = prompt('Enter technician password (try: Aetheris):');
            if (pass !== 'Aetheris') {
                alert('ACCESS_DENIED // Incorrect password');
                return;
            }

            // Simulate Filter Reset
            filterLife = 1; 
            systemOnline = true;
            flowDirection = 'in'; // Reset to vacuum mode
            
            updateMaintenanceHud();
            setStatus('sync-status', 'ONLINE_SYNCED');
            setStatus('flow-status', 'VACUUMING');
            document.getElementById('reset-filter-btn').disabled = true; // Disable until next error
            
            // Clean up old particle simulations
            unitGroup.remove(particlesIn, particlesOut);
            particlesIn = createFlowParticles();
            unitGroup.add(particlesIn);
            
            // Show new output
            particlesOut = createCleanAirOutput();
            unitGroup.add(particlesOut);
            scene.add(new THREE.PointLight(0x00f3ff, 5, 20).position.set(0, 4, 0)); // Add clean light flash
        };

        const init = () => {
            sceneSetup();
            createGrid();
            unitGroup = createAetherisUnit();
            scene.add(unitGroup);

            // Flow Simulations
            particlesIn = createFlowParticles();
            particlesOut = createCleanAirOutput();
            unitGroup.add(particlesIn);

            setStatus('sync-status', 'ONLINE_SYNCED');
            setStatus('flow-status', 'VACUUMING');
            document.getElementById('reset-filter-btn').disabled = true; // Disabled initially

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };

        // === RENDER LOOP ===
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            time += delta;

            if (systemOnline) {
                // Simulated Filter Decay (Linear breakdown over time)
                filterLife -= delta * 0.003; // Filter life decays 100% in ~333 seconds
                updateMaintenanceHud();
                checkSystemHealth();
            }

            // Aetheris-7 Animation
            const halo = unitGroup.getObjectByName("HaloApex");
            if (halo) {
                // Halo Breathing (Intensity sync)
                const s = 1 + Math.sin(time * 2) * 0.05;
                halo.scale.set(s, s, s);
                halo.material.opacity = systemOnline ? (0.5 + Math.sin(time * 2) * 0.3) : 0.2; // Dim halo if offline
            }

            // Particle Simulations (FLOW)
            if (systemOnline) {
                // Vacuuming Input Simulation ( murky particles rise into base)
                const inPos = particlesIn.geometry.attributes.position;
                const inCol = particlesIn.geometry.attributes.color;
                
                for (let i = 0; i < inPos.count; i++) {
                    const idx = i * 3;
                    inPos.array[idx + 1] += 0.03; // Rise velocity
                    
                    // As they rise into the core (above y=0), they clear
                    if (inPos.array[idx + 1] > 0 && inPos.array[idx + 1] < 3.5) {
                        // Ionization simulation ( murk clearing to cyan)
                        inCol.array[idx] = 0.0;
                        inCol.array[idx+1] = 0.9;
                        inCol.array[idx+2] = 1.0;
                    }
                    
                    // Reset particles that have finished the core journey (above apex y=3.8)
                    if (inPos.array[idx + 1] > 3.8) {
                        inPos.array[idx] = (Math.random() - 0.5) * 10;
                        inPos.array[idx + 1] = Math.random() * -5 - 3;
                        inPos.array[idx + 2] = (Math.random() - 0.5) * 10;
                        
                        // MURK Reset
                        inCol.array[idx] = 0.1; inCol.array[idx + 1] = 0.5; inCol.array[idx + 2] = 1.0;
                    }
                }
                inPos.needsUpdate = true;
                inCol.needsUpdate = true;

                // Clean Air Output Simulation (Plume from Halo)
                if (filterLife > 0.15) { // Only output if filter is okay
                    // Add clean plume visual if not present
                    if (!unitGroup.getObjectByName("CleanAirOutput")) {
                         unitGroup.add(particlesOut);
                    }
                    
                    const outPos = particlesOut.geometry.attributes.position;
                    for (let i = 0; i < outPos.count; i++) {
                        const idx = i * 3;
                        outPos.array[idx + 1] += 0.05; // Plume rise velocity
                        outPos.array[idx] += (Math.random() - 0.5) * 0.1; // Diffusion
                        outPos.array[idx + 2] += (Math.random() - 0.5) * 0.1; // Diffusion
                        
                        // Reset if it gets too high or too dispersed
                        if (outPos.array[idx + 1] > 10 || Math.abs(outPos.array[idx]) > 5) {
                            outPos.array[idx] = (Math.random() - 0.5) * 2;
                            outPos.array[idx + 1] = 3.8;
                            outPos.array[idx + 2] = (Math.random() - 0.5) * 2;
                        }
                    }
                    outPos.needsUpdate = true;
                } else if (unitGroup.getObjectByName("CleanAirOutput")) {
                    // Remove if filter too low
                    unitGroup.remove(particlesOut);
                }
            } else {
                // Offline Mode - ensure output plume removed
                if (unitGroup.getObjectByName("CleanAirOutput")) {
                    unitGroup.remove(particlesOut);
                }
            }

            // Auto-rotation (Diagnostic view)
            if (systemOnline) unitGroup.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        // Start Diagnostic Terminal
        init();
    </script>
</body>
</html>
