<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OLYMPUS // AETHERIS-7 // LIVE_RENDER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00f3ff; --glass: rgba(5, 5, 10, 0.95); --pink: #ff0055; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Courier New', monospace; color: var(--neon); }
        canvas#mainCanvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            font-size: 11px; letter-spacing: 2px; pointer-events: none;
            text-shadow: 0 0 10px var(--neon);
        }
        
        #status-hud {
            position: absolute; top: 25px; right: 25px; z-index: 1000;
            background: var(--glass); padding: 15px; border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.3); backdrop-filter: blur(20px);
            width: 180px;
        }
        
        #filter-bar-container {
            width: 100%; height: 8px; background: rgba(255, 0, 85, 0.1);
            border-radius: 4px; overflow: hidden; margin-top: 8px;
        }
        #filter-bar { width: 100%; height: 100%; background: var(--pink); transition: width 0.3s linear; }

        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 300px; z-index: 1000;
            background: var(--glass); padding: 20px; border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.3); backdrop-filter: blur(20px);
        }
        
        .btn {
            width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 243, 255, 0.5);
            color: var(--neon); padding: 14px; border-radius: 6px;
            cursor: pointer; text-transform: uppercase; font-size: 12px; font-weight: 900;
            font-family: inherit;
        }
        
        .glitch { color: var(--pink); animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0.1; } }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>

    <div id="ui">
        // OLYMPUS_AETHERIS-7_ENGINE<br>
        // STATUS: <span id="sync-status">ONLINE</span><br>
        // FLOW: <span id="flow-status">ACTIVE</span>
    </div>

    <div id="status-hud">
        // Filter_Life //
        <div id="filter-percent">100%</div>
        <div id="filter-bar-container"><div id="filter-bar"></div></div>
    </div>

    <div id="controls">
        <button id="reset-filter-btn" class="btn" onclick="simFilterChange()">Filter Change</button>
    </div>

    <script>
        let scene, camera, renderer, clock, unitGroup;
        let particlesIn, particlesOut, filterLife = 1.0;
        let systemOnline = true;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 15);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('mainCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            clock = new THREE.Clock();

            // Lighting
            const light = new THREE.PointLight(0x00d4ff, 2, 50);
            light.position.set(5, 10, 5);
            scene.add(light, new THREE.AmbientLight(0x202020));

            // Grid
            const grid = new THREE.GridHelper(100, 50, 0x00f3ff, 0x001a1a);
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);

            buildUnit();
            createParticles();
            animate();
        }

        function buildUnit() {
            unitGroup = new THREE.Group();

            // 7m Frame
            const frame = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 7, 2.5),
                new THREE.MeshPhongMaterial({ color: 0x111111, transparent: true, opacity: 0.8 })
            );
            const edges = new THREE.EdgesGeometry(frame.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00d4ff }));
            unitGroup.add(frame, line);

            // 3M Core
            const core = new THREE.Mesh(
                new THREE.CylinderGeometry(0.8, 0.8, 6, 32),
                new THREE.MeshPhongMaterial({ color: 0x00d4ff, emissive: 0x00d4ff, emissiveIntensity: 0.5, transparent: true, opacity: 0.5 })
            );
            unitGroup.add(core);

            // Halo Apex
            const halo = new THREE.Mesh(
                new THREE.TorusGeometry(1.5, 0.05, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x00f3ff })
            );
            halo.rotation.x = Math.PI / 2;
            halo.position.y = 3.8;
            halo.name = "Halo";
            unitGroup.add(halo);

            scene.add(unitGroup);
        }

        function createParticles() {
            const tex = createCircleTexture();
            
            // Intake (Vacuum)
            const inGeom = new THREE.BufferGeometry();
            const inPos = new Float32Array(1500 * 3);
            for(let i=0; i<1500*3; i++) inPos[i] = (Math.random()-0.5) * 10;
            inGeom.setAttribute('position', new THREE.BufferAttribute(inPos, 3));
            particlesIn = new THREE.Points(inGeom, new THREE.PointsMaterial({ size: 0.1, map: tex, color: 0x444444, transparent: true, blending: THREE.AdditiveBlending }));
            scene.add(particlesIn);

            // Output (Clean)
            const outGeom = new THREE.BufferGeometry();
            const outPos = new Float32Array(800 * 3);
            for(let i=0; i<800*3; i++) {
                outPos[i*3] = 0; outPos[i*3+1] = 3.8; outPos[i*3+2] = 0;
            }
            outGeom.setAttribute('position', new THREE.BufferAttribute(outPos, 3));
            particlesOut = new THREE.Points(outGeom, new THREE.PointsMaterial({ size: 0.3, map: tex, color: 0x00f3ff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending }));
            scene.add(particlesOut);
        }

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32,32,0,32,32,32);
            grad.addColorStop(0, 'white'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
            return new THREE.CanvasTexture(canvas);
        }

        window.simFilterChange = function() {
            const pass = prompt('Enter Technician Password:');
            if(pass === 'Aetheris') {
                filterLife = 1.0;
                systemOnline = true;
                document.getElementById('sync-status').textContent = "ONLINE";
                document.getElementById('sync-status').className = "";
                document.getElementById('flow-status').textContent = "ACTIVE";
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            if(systemOnline) {
                filterLife -= 0.001;
                if(filterLife <= 0) {
                    systemOnline = false;
                    document.getElementById('sync-status').textContent = "FAILURE";
                    document.getElementById('sync-status').className = "glitch";
                    document.getElementById('flow-status').textContent = "OFFLINE";
                }
            }

            document.getElementById('filter-percent').textContent = Math.max(0, Math.round(filterLife * 100)) + '%';
            document.getElementById('filter-bar').style.width = Math.max(0, filterLife * 100) + '%';

            // Particle Physics
            const inArr = particlesIn.geometry.attributes.position.array;
            for(let i=0; i<inArr.length; i+=3) {
                inArr[i+1] += 0.05;
                if(inArr[i+1] > 3) inArr[i+1] = -5;
            }
            particlesIn.geometry.attributes.position.needsUpdate = true;

            const outArr = particlesOut.geometry.attributes.position.array;
            if(systemOnline) {
                for(let i=0; i<outArr.length; i+=3) {
                    outArr[i+1] += 0.08;
                    outArr[i] += (Math.random()-0.5)*0.05;
                    if(outArr[i+1] > 10) { outArr[i+1] = 3.8; outArr[i] = 0; }
                }
            }
            particlesOut.geometry.attributes.position.needsUpdate = true;

            unitGroup.rotation.y += 0.005;
            const halo = unitGroup.getObjectByName("Halo");
            halo.scale.setScalar(1 + Math.sin(t*3)*0.1);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
