<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AETHERIS // UNIT_07 // DIAGNOSTIC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --neon: #00f3ff; --pink: #ff0055; --glass: rgba(5, 10, 15, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* DIAGNOSTIC HUD */
        #hud-left {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            pointer-events: none; text-shadow: 0 0 10px var(--neon);
            font-size: 12px; line-height: 1.6;
        }
        
        #hud-right {
            position: absolute; top: 30px; right: 30px; z-index: 100;
            background: var(--glass); padding: 20px; border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 4px; width: 220px; backdrop-filter: blur(10px);
        }

        .bar-bg { width: 100%; height: 6px; background: rgba(255, 0, 85, 0.1); border-radius: 3px; margin: 10px 0; }
        #filter-bar { width: 100%; height: 100%; background: var(--pink); box-shadow: 0 0 10px var(--pink); transition: width 0.5s; }

        /* ARTEMIS COMMAND CENTER */
        #controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 90%; max-width: 350px;
            background: var(--glass); padding: 25px; border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.3); text-align: center;
        }

        .btn {
            width: 100%; background: transparent; border: 1px solid var(--neon);
            color: var(--neon); padding: 15px; cursor: pointer;
            font-family: inherit; font-weight: 900; letter-spacing: 2px;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .btn:hover { background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }
        .btn:active { transform: scale(0.95); background: var(--neon); color: #000; }

        .glitch { animation: blink 0.2s infinite; color: var(--pink); }
        @keyframes blink { 50% { opacity: 0; } }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="hud-left">
        // SYSTEM: ARTEMIS_v3.0<br>
        // UNIT_ID: AETHERIS-7_CAN_ALTA_001<br>
        // CORE: 3M_ELECTROSTATIC_GEN_4<br>
        // SCALE: 7.0m VERTICAL_INDUCTION<br>
        <br>
        // STATUS: <span id="status-text">SYNCED</span><br>
        // FLOW: <span id="flow-text">VACUUMING</span>
    </div>

    <div id="hud-right">
        CORE_FILTER_INTEGRITY
        <div id="filter-val">100%</div>
        <div class="bar-bg"><div id="filter-bar"></div></div>
        <span style="font-size: 10px; opacity: 0.6;">SENSORS: ACTIVE</span>
    </div>

    <div id="controls">
        <button class="btn" onclick="triggerMaintenance()">INITIATE FILTER SWAP</button>
    </div>

    <script>
        let scene, camera, renderer, controls, clock, unit;
        let particlesIn, particlesOut, filterLife = 1.0;
        let isOnline = true;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(12, 8, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            clock = new THREE.Clock();

            // Lighting for "Industrial Cyberpunk" mood
            const pLight = new THREE.PointLight(0x00f3ff, 5, 20);
            pLight.position.set(5, 5, 5);
            scene.add(pLight, new THREE.AmbientLight(0x111111));

            createEnvironment();
            createAetherisUnit();
            createFlowSystems();
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createEnvironment() {
            const grid = new THREE.GridHelper(100, 40, 0x00f3ff, 0x001a1a);
            grid.position.y = -3.5;
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);
        }

        function createAetherisUnit() {
            unit = new THREE.Group();

            // Frame (7m height)
            const frameGeo = new THREE.BoxGeometry(2.5, 7, 2.5);
            const frameMat = new THREE.MeshPhongMaterial({ color: 0x050505, transparent: true, opacity: 0.9 });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            
            const edges = new THREE.EdgesGeometry(frameGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.5 }));
            unit.add(frame, line);

            // 3M Electrostatic Core
            const coreGeo = new THREE.CylinderGeometry(0.7, 0.7, 6, 32);
            const coreMat = new THREE.MeshPhongMaterial({ color: 0x00f3ff, emissive: 0x00f3ff, emissiveIntensity: 0.4, transparent: true, opacity: 0.3 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            unit.add(core);

            // Ionization Rings
            for(let i=0; i<8; i++) {
                const r = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.02, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00f3ff }));
                r.rotation.x = Math.PI/2;
                r.position.y = -2.5 + (i * 0.7);
                unit.add(r);
            }

            // Apex Halo
            const halo = new THREE.Mesh(new THREE.TorusGeometry(1.4, 0.05, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00f3ff }));
            halo.rotation.x = Math.PI/2;
            halo.position.y = 3.6;
            halo.name = "halo";
            unit.add(halo);

            scene.add(unit);
        }

        function createFlowSystems() {
            const tex = generateParticleTexture();
            
            // Vacuum Input (Base)
            const inGeo = new THREE.BufferGeometry();
            const inPos = new Float32Array(2000 * 3);
            for(let i=0; i<2000*3; i++) inPos[i] = (Math.random()-0.5) * 8;
            inGeo.setAttribute('position', new THREE.BufferAttribute(inPos, 3));
            particlesIn = new THREE.Points(inGeo, new THREE.PointsMaterial({ size: 0.08, map: tex, color: 0x555555, transparent: true, blending: THREE.AdditiveBlending }));
            scene.add(particlesIn);

            // Clean Output (Apex)
            const outGeo = new THREE.BufferGeometry();
            const outPos = new Float32Array(1000 * 3);
            for(let i=0; i<1000*3; i++) { outPos[i*3] = 0; outPos[i*3+1] = 3.6; outPos[i*3+2] = 0; }
            outGeo.setAttribute('position', new THREE.BufferAttribute(outPos, 3));
            particlesOut = new THREE.Points(outGeo, new THREE.PointsMaterial({ size: 0.25, map: tex, color: 0x00f3ff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
            scene.add(particlesOut);
        }

        function generateParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32,32,0,32,32,32);
            grad.addColorStop(0, 'white'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
            return new THREE.CanvasTexture(canvas);
        }

        function triggerMaintenance() {
            const pass = prompt("ARTEMIS_AUTH_REQUIRED // ENTER TECHNICIAN KEY:");
            if(pass === "Aetheris") {
                filterLife = 1.0;
                isOnline = true;
                document.getElementById('status-text').textContent = "SYNCED";
                document.getElementById('status-text').className = "";
                document.getElementById('flow-text').textContent = "VACUUMING";
            } else {
                alert("ACCESS_DENIED");
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            if(isOnline) {
                filterLife -= 0.0005; // Presentation speed
                if(filterLife <= 0) {
                    isOnline = false;
                    document.getElementById('status-text').textContent = "SYSTEM_FAILURE";
                    document.getElementById('status-text').className = "glitch";
                    document.getElementById('flow-text').textContent = "STALLED";
                }
            }

            // Update UI
            document.getElementById('filter-val').textContent = Math.max(0, Math.round(filterLife * 100)) + "%";
            document.getElementById('filter-bar').style.width = Math.max(0, filterLife * 100) + "%";

            // Flow Physics
            const inArr = particlesIn.geometry.attributes.position.array;
            for(let i=0; i<inArr.length; i+=3) {
                inArr[i+1] += isOnline ? 0.04 : 0.005;
                if(inArr[i+1] > 0) inArr[i+1] = -6;
            }
            particlesIn.geometry.attributes.position.needsUpdate = true;

            const outArr = particlesOut.geometry.attributes.position.array;
            if(isOnline && filterLife > 0.05) {
                for(let i=0; i<outArr.length; i+=3) {
                    outArr[i+1] += 0.07;
                    outArr[i] += Math.sin(elapsed + i) * 0.02;
                    if(outArr[i+1] > 12) { outArr[i+1] = 3.6; outArr[i] = 0; }
                }
            }
            particlesOut.geometry.attributes.position.needsUpdate = true;

            // Unit Micro-Animations
            unit.rotation.y += 0.003;
            const halo = unit.getObjectByName("halo");
            halo.scale.setScalar(1 + Math.sin(elapsed * 2) * 0.05);
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
